<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#ffffff" />
<title>The Amazing Puzzle™</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/png" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Amazing Puzzle" />
<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="onboarding.css" />
<link rel="stylesheet" href="grownup.css" />
<link rel="stylesheet" href="teach.css" />
<link rel="stylesheet" href="friends.css" />
<link rel="stylesheet" href="kidmagic.css" />
<link rel="stylesheet" href="funnel.css" />
</head>
<body>
  <div class="phone">
    <!-- 1.1 Splash: the real brand logo gently fades in while the app hydrates
         (visible before any JS runs; app.js dismisses it when ready). The logo
         already carries the wordmark + tagline. -->
    <div class="splash" id="splash" aria-hidden="true">
      <img class="splash__logo" src="logo.png" width="705" height="705"
           alt="The Amazing Puzzle — Giving Every Child A Voice" />
    </div>

    <!-- Screens mount here -->
    <main class="screen" id="screen"></main>

    <!-- Persistent companion (a cast member, placed by role — never random) -->
    <div class="buddy" id="buddy" hidden>
      <div class="buddy__bubble" id="buddyBubble"></div>
      <button class="buddy__chip" id="buddyChip" aria-label="Say hi to your friend"></button>
    </div>

    <!-- 🚂 THE TRAIN — bottom navigation. Freddy drives; each car is a stop. -->
    <nav class="train" id="train" aria-label="Go places">
      <div class="train__track" aria-hidden="true"></div>
      <button class="loco" id="loco" aria-label="Freddy the conductor">
        <span class="loco__body">🚂</span><span class="loco__driver">🐸</span>
        <span class="loco__smoke"><i></i><i></i><i></i></span>
      </button>
      <div class="train__cars" id="trainCars"><!-- cars injected --></div>
    </nav>

    <!-- Persistent emergency SOS. Emergency words must be one tap away from EVERY
         child screen; Home/World/Friends/Stars have no board header, so this
         chrome-level button guarantees the invariant there. Talk & category
         boards show their own inline SOS; go() toggles this one accordingly. -->
    <button class="sos-fab" id="sosFab" hidden aria-label="I Need — emergency words">
      <span class="sos">SOS</span> I Need
    </button>
  </div>

  <!-- I Need / SOS overlay -->
  <div class="overlay" id="needOverlay" hidden>
    <div class="overlay__card need-card">
      <div class="overlay__head">
        <h2>I Need…</h2>
        <button class="overlay__x" id="needClose" aria-label="Close">✕</button>
      </div>
      <div class="need-grid" id="needGrid"></div>
      <div class="need-foot" id="needFoot"></div>
    </div>
  </div>

  <script src="store.js"></script>
  <script src="idb.js"></script>
  <script src="data.js"></script>
  <script src="voices.js"></script>
  <script src="sound.js"></script>
  <script src="onboarding.js"></script>
  <script src="grownup.js"></script>
  <script src="teach.js"></script>
  <script src="funnel.js"></script>
  <script src="app.js"></script>
</body>
</html>
